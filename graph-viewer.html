<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interactive graph</title>
    <link rel="stylesheet" href="vis-network.min.css" />
    <style>
      html {
        height: 100%;
      }
      body {
        margin: 0;
        background: #0b0f1a;
        color: #e8ecf4;
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        height: 100vh;
        height: 100dvh;
        max-height: 100vh;
        max-height: 100dvh;
        box-sizing: border-box;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        grid-template-columns: 1fr;
      }
      header {
        padding: 16px 20px;
        background: linear-gradient(180deg, #12182a 0%, #0b0f1a 100%);
        border-bottom: 1px solid #2a3142;
      }
      h1 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 650;
      }
      #subtitle {
        margin: 6px 0 0;
        font-size: 0.8rem;
        color: #94a3b8;
        word-break: break-all;
      }
      #hint {
        padding: 8px 16px;
        font-size: 12px;
        color: #64748b;
        border-bottom: 1px solid #1e293b;
      }
      #network {
        min-height: 0;
        width: 100%;
        position: relative;
        overflow: hidden;
        background: radial-gradient(ellipse 80% 60% at 50% 40%, #151a2e 0%, #0b0f1a 65%);
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title">Concept graph</h1>
      <p id="subtitle"></p>
    </header>
    <div id="hint">Drag nodes · Scroll to zoom · Hover nodes/edges for full text · Edge labels show relationships</div>
    <div id="network"></div>
    <script src="vis-network.min.js"></script>
    <script src="graph-viewer.js"></script>
  </body>
</html>
